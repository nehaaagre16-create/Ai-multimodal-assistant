version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "4001:4001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      - PORT=4001
      - AI_MODEL=${AI_MODEL:-gemini-2.5-flash}
      - VISION_MODEL=${VISION_MODEL:-gemini-2.5-flash}
      - SUMMARY_MODEL=${SUMMARY_MODEL:-gemini-2.5-flash}
    volumes:
      - ./server/chat.db:/app/chat.db
      - ./server/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
